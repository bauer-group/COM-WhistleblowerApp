# ============================================================
# Hinweisgebersystem – Alembic Configuration
# ============================================================
# Migrations run as superuser (DATABASE_ADMIN_URL) so they can
# manage extensions, roles, RLS policies, and schema changes.
# The application itself connects as app_user (non-superuser)
# to enforce Row-Level Security.
#
# Usage:
#   alembic upgrade head       # Apply all pending migrations
#   alembic revision -m "..."  # Create new migration
#   alembic downgrade -1       # Rollback one migration
# ============================================================

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template for new migration filenames
# E.g., 001_initial_schema.py, 002_add_categories.py
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path with the backend root so that `app.*` imports work
prepend_sys_path = .

# Timezone for revision creation timestamps
# timezone =

# Max length of characters to apply to the "slug" field
truncate_slug_length = 60

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# in the versions directory.
# sourceless = false

# Version number format (default: %%(rev)s)
# output_encoding = utf-8

# The sqlalchemy.url is intentionally left blank here.
# It is set dynamically in env.py from the DATABASE_ADMIN_URL
# environment variable (superuser connection for migrations).
sqlalchemy.url =


[post_write_hooks]
# Run code formatting on newly generated migration files
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# ── Logging ────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
