# ═══════════════════════════════════════════════════════════
# Whistleblower-App (GlobaLeaks) - Coolify
# BAUER GROUP | Compliance Reporting Platform (HinSchG)
# ═══════════════════════════════════════════════════════════
#
# Use Case: Self-hosted PaaS via Coolify.
# Variant C-Light: Coolify terminiert öffentliches TLS und re-encrypted intern
# zu GlobaLeaks:8443 mit dessen self-signed Cert. GlobaLeaks kennt kein
# X-Forwarded-Proto → Plain-HTTP-Forwarding erzeugt einen Redirect-Loop.
#
# Deployment:
#   In Coolify: "Docker Compose" Resource anlegen, dieses File einfügen,
#   Domain auf GLOBALEAKS_HOSTNAME setzen, Service-Port = 8443 (HTTPS!).
#   In Coolify-UI: "Force HTTPS" aus (Coolify macht das bereits), UND
#   "HTTPS Backend" / "insecure-skip-verify" aktivieren.
#
# WICHTIG nach erstem Start:
#   - Admin → HTTPS: Let's Encrypt DEAKTIVIEREN
#   - Admin → Network → Tor: ON (falls gewünscht)
#
# ═══════════════════════════════════════════════════════════

name: globaleaks-coolify

services:
  # ═══════════════════════════════════════════════════════════
  # GlobaLeaks - Whistleblowing Platform
  # ═══════════════════════════════════════════════════════════
  globaleaks:
    image: ${GLOBALEAKS_IMAGE:-globaleaks/globaleaks:latest}
    platform: linux/amd64
    container_name: GLOBALEAKS_SERVER
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${GLOBALEAKS_CPU_LIMIT:-2.0}'
          memory: ${GLOBALEAKS_MEM_LIMIT:-1024M}
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
      # Coolify-Magic-Var: Service-URL auf der die App erreichbar ist.
      # Wird von Coolify automatisch in den eingebauten Proxy gemappt.
      - SERVICE_FQDN_GLOBALEAKS_8443
    volumes:
      - data:/var/globaleaks
    ports:
      # HTTPS intern auf 8443 (GlobaLeaks self-signed).
      # Coolify muss "insecure skip verify" zum Backend nutzen.
      - "8443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fksS -o /dev/null https://localhost:8443/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

### Volumes ###
volumes:
  data:
    driver: local
    name: globaleaks-data
