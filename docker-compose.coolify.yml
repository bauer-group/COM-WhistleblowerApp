# ═══════════════════════════════════════════════════════════
# Whistleblower-App (GlobaLeaks) - Coolify
# BAUER GROUP | Compliance Reporting Platform (HinSchG)
# ═══════════════════════════════════════════════════════════
#
# Use Case: Self-hosted PaaS via Coolify.
# Image wird aus src/ gebaut (Coolify cloned Git-Repo, baut bei Deploy).
# Patch lehrt GlobaLeaks X-Forwarded-Proto zu respektieren → Coolifys
# Default-Routing (HTTP zu Backend) funktioniert ohne Zusatz-Labels.
#
# Deployment:
#   In Coolify als "Docker Compose" Resource mit Git-Quelle anlegen.
#   Coolify baut das Image selbst aus src/Dockerfile.
#
# ═══════════════════════════════════════════════════════════

name: globaleaks-coolify

services:
  globaleaks:
    build:
      context: ./src
      args:
        BASE_VERSION: ${GLOBALEAKS_BASE_VERSION:-latest}
        BEHIND_PROXY: "true"
    platform: linux/amd64
    container_name: GLOBALEAKS_SERVER
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${GLOBALEAKS_CPU_LIMIT:-2.0}'
          memory: ${GLOBALEAKS_MEM_LIMIT:-1024M}
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
    volumes:
      - data:/var/globaleaks
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  data:
    driver: local
    name: globaleaks-data
