# ═══════════════════════════════════════════════════════════
# Whistleblower-App (GlobaLeaks) - Development
# BAUER GROUP | Compliance Reporting Platform (HinSchG)
# ═══════════════════════════════════════════════════════════
#
# Use Case: Lokale Entwicklung mit direktem Port-Zugriff.
# Image wird aus src/ gebaut (BAUER-GROUP-Patch für Reverse-Proxy-Support).
#
# Deployment:
#   docker compose -f docker-compose.development.yml up -d --build
#
# Erreichbar:
#   http://localhost:8080  (Wizard + Plattform)
#
# ═══════════════════════════════════════════════════════════

name: globaleaks-development

services:
  globaleaks:
    build:
      context: ./src
      args:
        BASE_VERSION: ${GLOBALEAKS_BASE_VERSION:-latest}
        BEHIND_PROXY: "false"
    platform: linux/amd64
    container_name: GLOBALEAKS_SERVER
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${GLOBALEAKS_CPU_LIMIT:-2.0}'
          memory: ${GLOBALEAKS_MEM_LIMIT:-1024M}
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
    volumes:
      - data:/var/globaleaks
    ports:
      - "${GLOBALEAKS_HTTP_PORT:-8080}:8080/tcp"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
    driver: local
    name: globaleaks-data
